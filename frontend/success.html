<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Successful | LuxeStore</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .success-container {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-icon {
            font-size: 5rem;
            color: #10b981;
            margin-bottom: 2rem;
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        .success-container h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }

        .success-container p {
            color: var(--secondary);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            max-width: 500px;
        }

        .order-id {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem 2rem;
            border-radius: 4px;
            font-family: monospace;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 3rem;
        }

        .btn-home {
            padding: 1.25rem 3rem;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .btn-home:hover {
            background: var(--secondary);
            transform: translateY(-5px);
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">
            <i class="fas fa-shopping-bag"></i> LuxeStore
        </a>
    </header>

    <main class="container">
        <div class="success-container">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h1>Order Confirmed</h1>
            <p>Thank you for choosing LuxeStore. Your premium fashion selection is being prepared for shipment. A confirmation email has been sent to your inbox.</p>
            
            <div class="order-id">
                ORDER SECURED VIA RAZORPAY
            </div>

            <a href="index.html" class="btn-home">Back to Gallery</a>
        </div>
    </main>

    <script>
        // Clear cart on successful purchase
        localStorage.removeItem("cart");
    </script>
</body>
</html>
