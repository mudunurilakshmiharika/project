<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | LuxeStore</title>
  <link rel="stylesheet" href="style.css?v=2">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <i class="fas fa-shopping-bag"></i> LuxeStore
  </a>
</header>

<main class="container">
  <div class="auth-container">
    <h2>Login</h2>
    <form id="login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn-auth">Login</button>
    </form>
    <p style="margin-top: 1.5rem; text-align: center; font-size: 0.85rem; color: var(--secondary);">
      Don't have an account? <a href="signup.html" style="color: #fff; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Sign Up</a>
    </p>
  </div>
</main>

<script>
  const AUTH_API = window.location.hostname === "project-7-zgr1.onrender.com" 
    ? "https://project-7-zgr1.onrender.com/api/auth/signin" 
    : "http://localhost:5000/api/auth/signin";

  document.getElementById("login-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
      const res = await fetch(AUTH_API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (res.ok) {
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));
        alert("Logged in successfully!");
        window.location.href = "index.html";
      } else {
        alert(data.message);
      }
    } catch (err) {
      alert("Error connecting to server");
    }
  });
</script>
</body>
</html>
