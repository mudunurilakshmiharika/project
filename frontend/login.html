<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | LuxeStore</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    .auth-container {
      max-width: 400px;
      margin: 4rem auto;
      background: white;
      padding: 2.5rem;
      border-radius: 1.5rem;
      box-shadow: var(--shadow);
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: var(--text-main);
    }
    .form-group input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #e2e8f0;
      border-radius: 0.5rem;
      outline: none;
      transition: var(--transition);
    }
    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .auth-title {
      text-align: center;
      margin-bottom: 2rem;
      font-size: 2rem;
      font-weight: 800;
    }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <i class="fas fa-shopping-bag"></i> LuxeStore
  </a>
</header>

<main class="container">
  <div class="auth-container">
    <h2>Login</h2>
    <form id="login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn-auth">Login</button>
    </form>
    <p style="margin-top: 1.5rem; text-align: center; font-size: 0.85rem; color: #666;">
      Don't have an account? <a href="signup.html" style="color: #000; font-weight: 600;">Sign Up</a>
    </p>
  </div>
</main>

<script>
  document.getElementById("login-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
      const res = await fetch("https://project-7-zgr1.onrender.com/api/auth/signin", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (res.ok) {
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));
        alert("Logged in successfully!");
        window.location.href = "index.html";
      } else {
        alert(data.message);
      }
    } catch (err) {
      alert("Error connecting to server");
    }
  });
</script>
</body>
</html>
