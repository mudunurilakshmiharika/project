<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | LuxeStore</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>
<body>

<header>
  <a href="index.html" class="logo">
    <i class="fas fa-shopping-bag"></i> LuxeStore
  </a>
</header>

<main class="container">
  <div class="auth-container">
    <h2>Create Account</h2>
    <form id="signup-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Create a password" required>
      </div>
      <button type="submit" class="btn-auth">Create Account</button>
    </form>
    <p style="margin-top: 1.5rem; text-align: center; font-size: 0.85rem; color: #666;">
      Already have an account? <a href="login.html" style="color: #000; font-weight: 600;">Sign In</a>
    </p>
  </div>
</main>

<script>
  document.getElementById("signup-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
      const res = await fetch("https://project-7-zgr1.onrender.com/api/auth/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email, password })
      });
      const data = await res.json();

      if (res.ok) {
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));
        alert("Account created successfully!");
        window.location.href = "index.html";
      } else {
        alert(data.message);
      }
    } catch (err) {
      alert("Error connecting to server");
    }
  });
</script>
</body>
</html>
