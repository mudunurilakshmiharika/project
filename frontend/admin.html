<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | LuxeStore</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    .admin-container {
      margin-top: 2rem;
    }
    .order-card {
      background: white;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: var(--shadow);
      margin-bottom: 2rem;
    }
    .order-header {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #f1f5f9;
      padding-bottom: 1rem;
      margin-bottom: 1rem;
    }
    .status-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 600;
      background: #dcfce7;
      color: #166534;
    }
    .item-list {
      list-style: none;
      margin: 1rem 0;
    }
    .item-list li {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px dashed #f1f5f9;
    }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <i class="fas fa-user-shield"></i> Admin Panel
  </a>
  <nav>
    <a href="index.html">View Store</a>
  </nav>
</header>

<main class="container">
  <h2>All Customer Orders</h2>
  <div id="orders-list" class="admin-container">
    <!-- Orders will be loaded here -->
  </div>
</main>

<script>
  async function fetchOrders() {
    try {
      const response = await fetch("https://project-7-zgr1.onrender.com/api/orders");
      const orders = await response.json();
      displayOrders(orders);
    } catch (error) {
      console.error("Error:", error);
    }
  }

  function displayOrders(orders) {
    const container = document.getElementById("orders-list");
    container.innerHTML = "";

    if (orders.length === 0) {
      container.innerHTML = "<h3>No orders found.</h3>";
      return;
    }

    orders.forEach(order => {
      const div = document.createElement("div");
      div.className = "order-card";
      div.innerHTML = `
        <div class="order-header">
          <div>
            <strong>Order ID:</strong> ${order._id}<br>
            <small>${new Date(order.createdAt).toLocaleString()}</small>
          </div>
          <span class="status-badge">${order.paymentMethod}</span>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
          <div>
            <h4>Customer Details</h4>
            <p><strong>Name:</strong> ${order.shippingAddress.name}</p>
            <p><strong>Address:</strong> ${order.shippingAddress.address}</p>
            <p><strong>Location:</strong> ${order.shippingAddress.city} - ${order.shippingAddress.pincode}</p>
          </div>
          <div>
            <h4>Items Ordered</h4>
            <ul class="item-list">
              ${order.items.map(item => `
                <li>
                  <span>${item.name}</span>
                  <span>₹${item.price}</span>
                </li>
              `).join("")}
            </ul>
            <p style="text-align: right; font-size: 1.25rem; font-weight: 700; color: var(--primary);">
              Total: ₹${order.totalAmount}
            </p>
          </div>
        </div>
      `;
      container.appendChild(div);
    });
  }

  fetchOrders();
</script>
</body>
</html>
